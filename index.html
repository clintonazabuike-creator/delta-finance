<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delta Finance | Live Dashboard</title>
    <style>
        :root { --primary: #00E676; --bg: #050505; --card: #121212; --text: #E0E0E0; --border: #222; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--primary); }
        .live-indicator { font-size: 10px; display: flex; align-items: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .market-grid { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .price-card { background: var(--card); border: 1px solid var(--border); padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .coin-info { display: flex; flex-direction: column; }
        .symbol { font-weight: 800; font-size: 18px; }
        .name { font-size: 12px; color: #888; }
        .price { font-family: 'Courier New', monospace; font-size: 20px; font-weight: bold; }
        
        .converter-box { background: var(--primary); color: #000; padding: 25px; border-radius: 16px; margin-top: 25px; }
        .converter-box h3 { margin: 0 0 15px 0; font-size: 16px; }
        input { width: 100%; padding: 12px; border: none; border-radius: 8px; margin-bottom: 10px; font-size: 16px; font-weight: bold; }

        footer { text-align: center; padding: 30px; font-size: 10px; opacity: 0.5; letter-spacing: 1px; }
    </style>
</head>
<body>

<header>
    <div class="logo">DELTA_FINANCE</div>
    <div class="live-indicator"><span class="dot"></span> LIVE MARKET</div>
</header>

<div class="market-grid" id="market-list">
    <div class="price-card">
        <div class="coin-info">
            <span class="symbol">BTC</span>
            <span class="name">Bitcoin</span>
        </div>
        <div class="price" id="btc-price">Loading...</div>
    </div>
    <div class="price-card">
        <div class="coin-info">
            <span class="symbol">ETH</span>
            <span class="name">Ethereum</span>
        </div>
        <div class="price" id="eth-price">Loading...</div>
    </div>
    <div class="price-card">
        <div class="coin-info">
            <span class="symbol">SOL</span>
            <span class="name">Solana</span>
        </div>
        <div class="price" id="sol-price">Loading...</div>
    </div>
</div>

<div class="converter-box">
    <h3>QUICK CURRENCY CONVERTER (USD/NGN)</h3>
    <input type="number" id="usd-input" placeholder="Amount in USD" oninput="updateNaira()">
    <div id="ngn-output" style="font-weight: 900; font-size: 22px;">₦ 0.00</div>
</div>

<footer>
    DATA STREAMED VIA PUBLIC API <br>
    ENGINEERED BY CLINTONAZABUIKE-CREATOR
</footer>

<script>
    // Live Price Fetcher (No Server Needed)
    async function fetchPrices() {
        try {
            const response = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,solana&vs_currencies=usd');
            const data = await response.json();
            
            document.getElementById('btc-price').innerText = '$' + data.bitcoin.usd.toLocaleString();
            document.getElementById('eth-price').innerText = '$' + data.ethereum.usd.toLocaleString();
            document.getElementById('sol-price').innerText = '$' + data.solana.usd.toLocaleString();
        } catch (error) {
            console.error("API Limit reached or network error.");
        }
    }

    // Currency Logic
    function updateNaira() {
        const usd = document.getElementById('usd-input').value;
        const rate = 1620; // Example current rate
        const total = usd * rate;
        document.getElementById('ngn-output').innerText = '₦ ' + total.toLocaleString();
    }

    // Auto-update every 30 seconds
    fetchPrices();
    setInterval(fetchPrices, 30000);
</script>

</body>
</html>
